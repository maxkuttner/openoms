<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="openOMS — a high-performance, open-source order management system">
  <style>
    .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
  <rect x="0.5" y="0.5" width="1279" height="319" rx="2" fill="#ffffff" stroke="#e0e3e8"/>

  <!-- depth glyph: green bids over amber asks -->
  <g>
    <rect x="80" y="102" width="62" height="13" rx="1" fill="#1aa06e"/>
    <rect x="80" y="121" width="88" height="13" rx="1" fill="#1aa06e"/>
    <rect x="80" y="140" width="48" height="13" rx="1" fill="#1aa06e"/>
    <rect x="80" y="156" width="104" height="8" rx="1" fill="#dfe3e8"/>
    <rect x="80" y="167" width="75" height="13" rx="1" fill="#be8a30"/>
    <rect x="80" y="186" width="55" height="13" rx="1" fill="#be8a30"/>
    <rect x="80" y="205" width="94" height="13" rx="1" fill="#be8a30"/>
  </g>

  <!-- wordmark -->
  <text x="232" y="150" class="mono" font-size="64" letter-spacing="-3">
    <tspan font-weight="400" fill="#9aa3af">open</tspan><tspan font-weight="800" fill="#1a1e26">OMS</tspan>
  </text>

  <!-- tagline -->
  <text x="234" y="186" class="mono" font-size="18" font-weight="500" fill="#6b7280">A high-performance, open-source order management system.</text>

  <!-- chips -->
  <g class="mono" font-size="12" fill="#6b7280">
    <rect x="234" y="203" width="150" height="26" rx="5" fill="none" stroke="#e0e3e8"/>
    <text x="246" y="220">⚡ sub-µs latency</text>
    <rect x="396" y="203" width="108" height="26" rx="5" fill="none" stroke="#e0e3e8"/>
    <text x="408" y="220">MIT licensed</text>
    <rect x="516" y="203" width="98" height="26" rx="5" fill="none" stroke="#e0e3e8"/>
    <text x="528" y="220">FIX · gRPC</text>
  </g>
</svg>
